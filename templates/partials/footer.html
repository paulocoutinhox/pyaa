{% load compress %}
{% load static %}
{% load i18n %}

{% compress js %}
<script src="{% static 'vendor/magnific-popup/js/jquery.magnific-popup.min.js'%}"></script>
<script src="{% static 'vendor/jquery-mask/js/jquery.mask.min.js'%}"></script>
{% endcompress %}

<footer class="footer mt-auto py-3 bg-body-tertiary">
    <div class="container">
        <p class="text-center">© 2024 {% translate "pyaa.site.name" %}</p>
        <p class="text-center">
            <a href="{% url 'content_by_tag' content_tag='privacy-policy' %}" class="link-secondary">
                {% translate "pyaa.site.privacy" %}
            </a>
            •
            <a href="{% url 'content_by_tag' content_tag='terms-and-conditions' %}" class="link-secondary">
                {% translate "pyaa.site.terms" %}
            </a>
        </p>
    </div>
</footer>

{% extends 'layouts/base.html' %}

{% block content %}

<div class="flex flex-col items-center w-screen h-screen">
    <div class="flex flex-col items-center p-12">
        <h1 class="my-10 text-3xl text-center">Delete Account?</h1>

        <p class="text-center">
            Are you sure you want to delete your account?
            <br>
            This will permanently delete your profile and any content you have generated.
        </p>

        <form action="{% url 'account_delete' %}" method="post" class="my-6">
            {% csrf_token %}
            {{ form }}

            <button type="submit"
                class="flex items-center justify-center px-3 py-2 text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-red-300 font-medium text-sm text-center rounded-md me-2 my-2 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800">
                Yes, delete my account
            </button>
        </form>

        <a href="{% url 'account_profile' %}"
            class="flex items-center justify-center px-3 py-2 text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-300 font-medium text-sm text-center rounded-md me-2 my-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
            Cancel
        </a>
    </div>
</div>

{% endblock content %}

{% extends 'layouts/base.html' %}

{% block content %}

<div class="flex flex-col items-center w-screen h-screen">
    <div class="flex flex-col items-center p-12">
        <h1 class="my-10 text-3xl text-center">Profile</h1>

        <h3>Welcome {{ user.get_full_name }}!</h3>

        <p class="my-2">
            <a href="{% url 'account_email' %}"
                class="flex items-center justify-center w-full px-3 py-2 text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-300 font-medium text-sm text-center rounded-md me-2 my-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                Change email
            </a>
        </p>

        <p class="my-2">
            <a href="{% url 'account_update_profile' %}"
                class="flex items-center justify-center w-full px-3 py-2 text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-300 font-medium text-sm text-center rounded-md me-2 my-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                Update profile
            </a>
        </p>

        <form action="{% url 'account_delete' %}" method="delete" class="my-2">
            <button type="submit"
                class="flex items-center justify-center w-full px-3 py-2 text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-red-300 font-medium text-sm text-center rounded-md me-2 my-2 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800">
                Delete account
            </button>
        </form>

        <hr class="w-full my-5">

        <a href="{% url 'account_logout' %}"
            class="text-white bg-gray-800 hover:bg-gray-900 focus:outline-none focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-gray-800 dark:hover:bg-gray-700 dark:focus:ring-gray-700 dark:border-gray-700">
            Logout
        </a>
    </div>
</div>

{% endblock content %}
